    bucket: new_text
    mix_group: new_positive
    input_path: training/generator_sft/processed/all.chat.gen120_text_v2.jsonl
    count: 280
    match:
      template_family: gen120_summary
      should_refuse: false

  - name: benchmark_positive_risk
    bucket: new_text
    mix_group: new_positive
    input_path: training/generator_sft/processed/all.chat.gen120_text_v2.jsonl
    count: 280
    match:
      template_family: gen120_risk
      should_refuse: false

  - name: benchmark_positive_strategy
    bucket: new_text
    mix_group: new_positive
    input_path: training/generator_sft/processed/all.chat.gen120_text_v2.jsonl
    count: 240
    match:
      template_family: gen120_strategy
      should_refuse: false

  - name: benchmark_positive_table_text
    bucket: new_text
    mix_group: new_positive
    input_path: training/generator_sft/processed/all.chat.gen120_text_v2.jsonl
