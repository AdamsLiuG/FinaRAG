mix_tag: gen120_mix_v2
random_seed: finarag_gen120_mix_v2_20260425
allow_shortfall: false
dedupe_fields:
  - sample_id
  - query_id
  - variant_type

bucket_outputs:
  new_text: training/generator_sft/processed/new_text_2120.chat.gen120_mix_v2.jsonl
  old_regularizer: training/generator_sft/processed/old_regularizer_480.chat.gen120_mix_v2.jsonl

all_output_path: training/generator_sft/processed/all.chat.gen120_mix_v2.jsonl
stats_output_path: training/generator_sft/manifests/merge_stats.gen120_mix_v2.json

groups:
