model_name_or_path: "/media/main/lgd/llm/models/Qwen/Qwen3-Reranker-0.6B"
train_path: training/reranker_distill/processed/qwen3_reranker_sft_train.jsonl
eval_path: training/reranker_distill/processed/qwen3_reranker_sft_dev.jsonl
output_dir: /media/main/lgd/llm/FinaRAG/training/reranker_distill/saves/qwen3_reranker_0.6b_sft_lora

# Set to 4 if you want QLoRA instead of plain LoRA.
quantization_bits:
trust_remote_code: true
cutoff_len: 2048

instruction: "Given a Chinese financial annual report question, retrieve passages that directly answer the query with precise company, year, metric, and unit evidence."
system_prompt: 'Judge whether the Document meets the requirements based on the Query and the Instruct provided. Note that the answer can only be "yes" or "no".'

lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
modules_to_save: []

learning_rate: 2.0e-4
weight_decay: 0.0
num_train_epochs: 3.0
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
warmup_ratio: 0.05
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 3
seed: 42
bf16: true
fp16: false
gradient_checkpointing: true
max_grad_norm: 1.0
optim: adamw_torch
